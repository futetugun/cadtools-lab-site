<svg xmlns="http://www.w3.org/2000/svg" width="980" height="760" viewBox="0 0 980 760" role="img" aria-labelledby="title desc">
  <title id="title">CAD Tools Lab dashboard illustration</title>
  <desc id="desc">AutoCAD plugin product interface mockup</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#123047"/>
      <stop offset="1" stop-color="#18242c"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eaf2f4"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="18" dy="18" stdDeviation="0" flood-color="#123047" flood-opacity=".16"/>
    </filter>
  </defs>
  <rect width="980" height="760" rx="28" fill="#f4f7f8"/>
  <rect x="54" y="54" width="872" height="652" rx="22" fill="url(#bg)"/>
  <g opacity=".24" stroke="#9db7c4" stroke-width="1">
    <path d="M120 160h740M120 240h740M120 320h740M120 400h740M120 480h740M120 560h740"/>
    <path d="M180 110v520M300 110v520M420 110v520M540 110v520M660 110v520M780 110v520"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="110" y="108" width="760" height="118" rx="16" fill="url(#card)"/>
    <text x="146" y="154" font-family="Consolas, monospace" font-size="24" fill="#17211d">Before: ＡＢＣ１２３（テスト） ｶﾝｷﾌｧﾝ</text>
    <text x="146" y="194" font-family="Consolas, monospace" font-size="24" fill="#1e6b8f">After : ABC123(テスト) カンキファン</text>
  </g>
  <g>
    <rect x="130" y="282" width="320" height="250" rx="18" fill="#fff9ec" opacity=".96"/>
    <text x="164" y="328" font-family="Yu Gothic, sans-serif" font-size="24" font-weight="700" fill="#17211d">Convert options</text>
    <g font-family="Yu Gothic, sans-serif" font-size="20" fill="#17211d">
      <rect x="164" y="362" width="22" height="22" rx="4" fill="#28a0a8"/><text x="202" y="382">Full-width digits</text>
      <rect x="164" y="410" width="22" height="22" rx="4" fill="#28a0a8"/><text x="202" y="430">Full-width letters</text>
      <rect x="164" y="458" width="22" height="22" rx="4" fill="#28a0a8"/><text x="202" y="478">Parentheses</text>
      <rect x="164" y="506" width="22" height="22" rx="4" fill="#28a0a8"/><text x="202" y="526">Katakana</text>
    </g>
  </g>
  <g>
    <rect x="510" y="282" width="340" height="250" rx="18" fill="#fff9ec" opacity=".96"/>
    <text x="544" y="328" font-family="Yu Gothic, sans-serif" font-size="24" font-weight="700" fill="#17211d">License check</text>
    <g font-family="Consolas, monospace" font-size="18">
      <text x="544" y="376" fill="#17211d">CheckProduct</text><text x="760" y="376" fill="#178a48">OK</text>
      <text x="544" y="420" fill="#17211d">CheckExpire</text><text x="760" y="420" fill="#178a48">OK</text>
      <text x="544" y="464" fill="#17211d">CheckMachine</text><text x="760" y="464" fill="#178a48">OK</text>
      <text x="544" y="508" fill="#17211d">LicenseKey</text><text x="760" y="508" fill="#178a48">OK</text>
    </g>
  </g>
  <g>
    <path d="M196 630h588" stroke="#1e6b8f" stroke-width="10" stroke-linecap="round"/>
    <circle cx="196" cy="630" r="22" fill="#1e6b8f"/>
    <circle cx="392" cy="630" r="22" fill="#1e6b8f"/>
    <circle cx="588" cy="630" r="22" fill="#1e6b8f"/>
    <circle cx="784" cy="630" r="22" fill="#1e6b8f"/>
    <g font-family="Yu Gothic, sans-serif" font-size="18" fill="#fff9ec" text-anchor="middle">
      <text x="196" y="637">1</text>
      <text x="392" y="637">2</text>
      <text x="588" y="637">3</text>
      <text x="784" y="637">4</text>
    </g>
    <g font-family="Yu Gothic, sans-serif" font-size="16" fill="#fff9ec" text-anchor="middle">
      <text x="196" y="680">APPLOAD</text>
      <text x="392" y="680">CTSETCODE</text>
      <text x="588" y="680">CTL</text>
      <text x="784" y="680">CONVERTTEXT</text>
    </g>
  </g>
</svg>
